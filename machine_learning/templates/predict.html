<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict - AgriSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-success mb-5">
        <div class="container">
            <a class="navbar-brand" href="/">AgriSmart AI</a>
        </div>
    </nav>
    <div class="container pb-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Enter Soil & Weather Details</h4>
            </div>
            <div class="card-body">
                <form action="/predict" method="POST">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label>Nitrogen (N)</label>
                            <input type="number" step="any" name="nitrogen" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label>Phosphorus (P)</label>
                            <input type="number" step="any" name="phosphorus" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label>Potassium (K)</label>
                            <input type="number" step="any" name="potassium" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label>Temperature (°C)</label>
                            <input type="number" step="any" name="temperature" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label>Humidity (%)</label>
                            <input type="number" step="any" name="humidity" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label>pH</label>
                            <input type="number" step="any" name="ph" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label>Rainfall (mm)</label>
                            <input type="number" step="any" name="rainfall" class="form-control" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success mt-4 px-4 w-100 py-2">Get Recommendation</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
