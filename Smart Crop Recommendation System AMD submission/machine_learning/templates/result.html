<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result - AgriSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-success mb-5">
        <div class="container">
            <a class="navbar-brand" href="/">AgriSmart AI</a>
        </div>
    </nav>
    <div class="container pb-5">
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow h-100 border-success">
                    <div class="card-body text-center py-5">
                        <h5 class="text-success text-uppercase">Highly Recommended</h5>
                        <h1 class="display-3 fw-bold text-dark text-capitalize">{{ crop }}</h1>
                        <span class="badge bg-success p-2 fs-6 mt-2">Confidence: {{ confidence }}%</span>
                        
                        <hr class="my-4">
                        <p class="text-muted mb-2">Other suitable alternatives:</p>
                        <div>
                            {% for c in top_crops[1:] %}
                                <span class="badge bg-secondary p-2 text-capitalize mx-1">{{ c }}</span>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6 mb-4">
                <div class="card shadow h-100 border-warning">
                    <div class="card-header bg-warning text-dark fw-bold">
                        Fertilizer Recommendations
                    </div>
                    <div class="card-body">
                        <ul class="list-group list-group-flush">
                            {% for fert in fertilizers %}
                                <li class="list-group-item d-flex align-items-center">
                                    <span class="badge bg-warning text-dark me-3 rounded-pill">{{ loop.index }}</span>
                                    {{ fert }}
                                </li>
                            {% endfor %}
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        <div class="text-center mt-4">
            <a href="/predict" class="btn btn-outline-success">Make Another Prediction</a>
        </div>
    </div>
</body>
</html>
